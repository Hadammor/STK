# Netlify build configuration for the Guy travel-safety demo (Vite + React).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires Node 20.19+/22.12+; pin to 22 to match local.
  NODE_VERSION = "22"

# Single-page app: serve index.html for any path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
